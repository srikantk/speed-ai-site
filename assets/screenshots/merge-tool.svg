<svg width="900" height="580" viewBox="0 0 900 580" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="shadow2">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#0000001a"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="900" height="580" rx="12" fill="#F8F9FF"/>

  <!-- Title Bar -->
  <rect width="900" height="42" rx="12" fill="#F9FAFB"/>
  <rect y="30" width="900" height="12" fill="#F9FAFB"/>
  <rect y="42" width="900" height="1" fill="#E5E7EB"/>
  <circle cx="20" cy="21" r="6" fill="#FF5F57"/>
  <circle cx="38" cy="21" r="6" fill="#FEBC2E"/>
  <circle cx="56" cy="21" r="6" fill="#28C840"/>
  <text x="450" y="27" text-anchor="middle" font-family="Inter,Arial" font-size="13" fill="#6B7280" font-weight="500">Speed PDF — Merge PDFs</text>

  <!-- Toolbar -->
  <rect y="43" width="900" height="44" fill="white"/>
  <rect y="87" width="900" height="1" fill="#E5E7EB"/>
  <text x="20" y="70" font-family="Inter,Arial" font-size="13" fill="#111827" font-weight="700">🔀 Merge PDFs</text>
  <rect x="700" y="55" width="90" height="24" rx="6" fill="#4F46E5"/>
  <text x="745" y="71" text-anchor="middle" font-family="Inter,Arial" font-size="11" fill="white" font-weight="600">Merge Now</text>
  <rect x="798" y="55" width="90" height="24" rx="6" fill="white" stroke="#E5E7EB" stroke-width="1"/>
  <text x="843" y="71" text-anchor="middle" font-family="Inter,Arial" font-size="11" fill="#374151">Save Preset</text>

  <!-- Drop zone -->
  <rect x="20" y="104" width="860" height="100" rx="12" fill="#F5F3FF" stroke="#C7D2FE" stroke-width="2" stroke-dasharray="8,5"/>
  <text x="450" y="148" text-anchor="middle" font-family="Inter,Arial" font-size="16" fill="#4F46E5">Drop PDFs here or</text>
  <rect x="366" y="158" width="168" height="28" rx="8" fill="#4F46E5"/>
  <text x="450" y="177" text-anchor="middle" font-family="Inter,Arial" font-size="12" fill="white" font-weight="600">Browse Files</text>

  <!-- File list header -->
  <text x="20" y="228" font-family="Inter,Arial" font-size="12" fill="#374151" font-weight="700">FILES TO MERGE (4)</text>
  <text x="880" y="228" text-anchor="end" font-family="Inter,Arial" font-size="11" fill="#6B7280">Drag to reorder</text>

  <!-- File rows -->
  <!-- File 1 -->
  <rect x="20" y="236" width="860" height="56" rx="10" fill="white" stroke="#E5E7EB" stroke-width="1" filter="url(#shadow2)"/>
  <!-- drag handle -->
  <rect x="34" y="256" width="14" height="2" rx="1" fill="#D1D5DB"/>
  <rect x="34" y="262" width="14" height="2" rx="1" fill="#D1D5DB"/>
  <rect x="34" y="268" width="14" height="2" rx="1" fill="#D1D5DB"/>
  <!-- PDF icon -->
  <rect x="56" y="248" width="28" height="34" rx="4" fill="#EF4444" fill-opacity="0.15"/>
  <text x="70" y="260" text-anchor="middle" font-family="Arial" font-size="8" fill="#EF4444" font-weight="700">PDF</text>
  <rect x="58" y="264" width="24" height="3" rx="1" fill="#EF4444" fill-opacity="0.4"/>
  <rect x="58" y="270" width="18" height="3" rx="1" fill="#EF4444" fill-opacity="0.4"/>
  <!-- filename -->
  <text x="96" y="261" font-family="Inter,Arial" font-size="13" fill="#111827" font-weight="600">Q1-Financial-Report.pdf</text>
  <text x="96" y="277" font-family="Inter,Arial" font-size="11" fill="#9CA3AF">4.2 MB  •  18 pages</text>
  <!-- order badge -->
  <circle cx="820" cy="264" r="14" fill="#4F46E5"/>
  <text x="820" y="269" text-anchor="middle" font-family="Inter,Arial" font-size="12" fill="white" font-weight="700">1</text>
  <!-- delete button -->
  <circle cx="856" cy="264" r="12" fill="#FEF2F2"/>
  <text x="856" y="269" text-anchor="middle" font-family="Inter,Arial" font-size="13" fill="#EF4444">×</text>

  <!-- File 2 -->
  <rect x="20" y="300" width="860" height="56" rx="10" fill="white" stroke="#E5E7EB" stroke-width="1" filter="url(#shadow2)"/>
  <rect x="34" y="320" width="14" height="2" rx="1" fill="#D1D5DB"/>
  <rect x="34" y="326" width="14" height="2" rx="1" fill="#D1D5DB"/>
  <rect x="34" y="332" width="14" height="2" rx="1" fill="#D1D5DB"/>
  <rect x="56" y="312" width="28" height="34" rx="4" fill="#EF4444" fill-opacity="0.15"/>
  <text x="70" y="324" text-anchor="middle" font-family="Arial" font-size="8" fill="#EF4444" font-weight="700">PDF</text>
  <rect x="58" y="328" width="24" height="3" rx="1" fill="#EF4444" fill-opacity="0.4"/>
  <rect x="58" y="334" width="18" height="3" rx="1" fill="#EF4444" fill-opacity="0.4"/>
  <text x="96" y="325" font-family="Inter,Arial" font-size="13" fill="#111827" font-weight="600">Q2-Financial-Report.pdf</text>
  <text x="96" y="341" font-family="Inter,Arial" font-size="11" fill="#9CA3AF">3.8 MB  •  15 pages</text>
  <circle cx="820" cy="328" r="14" fill="#4F46E5"/>
  <text x="820" y="333" text-anchor="middle" font-family="Inter,Arial" font-size="12" fill="white" font-weight="700">2</text>
  <circle cx="856" cy="328" r="12" fill="#FEF2F2"/>
  <text x="856" y="333" text-anchor="middle" font-family="Inter,Arial" font-size="13" fill="#EF4444">×</text>

  <!-- File 3 (highlighted/dragging) -->
  <rect x="20" y="364" width="860" height="56" rx="10" fill="#EEF2FF" stroke="#4F46E5" stroke-width="2" filter="url(#shadow2)"/>
  <rect x="34" y="384" width="14" height="2" rx="1" fill="#93C5FD"/>
  <rect x="34" y="390" width="14" height="2" rx="1" fill="#93C5FD"/>
  <rect x="34" y="396" width="14" height="2" rx="1" fill="#93C5FD"/>
  <rect x="56" y="376" width="28" height="34" rx="4" fill="#EF4444" fill-opacity="0.15"/>
  <text x="70" y="388" text-anchor="middle" font-family="Arial" font-size="8" fill="#EF4444" font-weight="700">PDF</text>
  <rect x="58" y="392" width="24" height="3" rx="1" fill="#EF4444" fill-opacity="0.4"/>
  <rect x="58" y="398" width="18" height="3" rx="1" fill="#EF4444" fill-opacity="0.4"/>
  <text x="96" y="389" font-family="Inter,Arial" font-size="13" fill="#4F46E5" font-weight="600">Q3-Financial-Report.pdf</text>
  <text x="96" y="405" font-family="Inter,Arial" font-size="11" fill="#7C3AED">3.5 MB  •  14 pages  •  dragging…</text>
  <circle cx="820" cy="392" r="14" fill="#4F46E5"/>
  <text x="820" y="397" text-anchor="middle" font-family="Inter,Arial" font-size="12" fill="white" font-weight="700">3</text>
  <circle cx="856" cy="392" r="12" fill="#FEF2F2"/>
  <text x="856" y="397" text-anchor="middle" font-family="Inter,Arial" font-size="13" fill="#EF4444">×</text>

  <!-- File 4 -->
  <rect x="20" y="428" width="860" height="56" rx="10" fill="white" stroke="#E5E7EB" stroke-width="1" filter="url(#shadow2)"/>
  <rect x="34" y="448" width="14" height="2" rx="1" fill="#D1D5DB"/>
  <rect x="34" y="454" width="14" height="2" rx="1" fill="#D1D5DB"/>
  <rect x="34" y="460" width="14" height="2" rx="1" fill="#D1D5DB"/>
  <rect x="56" y="440" width="28" height="34" rx="4" fill="#EF4444" fill-opacity="0.15"/>
  <text x="70" y="452" text-anchor="middle" font-family="Arial" font-size="8" fill="#EF4444" font-weight="700">PDF</text>
  <rect x="58" y="456" width="24" height="3" rx="1" fill="#EF4444" fill-opacity="0.4"/>
  <rect x="58" y="462" width="18" height="3" rx="1" fill="#EF4444" fill-opacity="0.4"/>
  <text x="96" y="453" font-family="Inter,Arial" font-size="13" fill="#111827" font-weight="600">Appendix-2025.pdf</text>
  <text x="96" y="469" font-family="Inter,Arial" font-size="11" fill="#9CA3AF">1.1 MB  •  6 pages</text>
  <circle cx="820" cy="456" r="14" fill="#4F46E5"/>
  <text x="820" y="461" text-anchor="middle" font-family="Inter,Arial" font-size="12" fill="white" font-weight="700">4</text>
  <circle cx="856" cy="456" r="12" fill="#FEF2F2"/>
  <text x="856" y="461" text-anchor="middle" font-family="Inter,Arial" font-size="13" fill="#EF4444">×</text>

  <!-- Summary bar -->
  <rect x="20" y="496" width="860" height="52" rx="10" fill="white" stroke="#E5E7EB" stroke-width="1"/>
  <text x="36" y="516" font-family="Inter,Arial" font-size="12" fill="#374151" font-weight="600">Output:</text>
  <text x="36" y="535" font-family="Inter,Arial" font-size="12" fill="#6B7280">Annual-Report-2025-merged.pdf  •  53 pages  •  12.6 MB total</text>
  <rect x="700" y="504" width="170" height="36" rx="8" fill="#4F46E5"/>
  <text x="785" y="526" text-anchor="middle" font-family="Inter,Arial" font-size="13" fill="white" font-weight="700">⚡ Merge 4 Files</text>

  <!-- Status bar -->
  <rect x="0" y="564" width="900" height="16" fill="#F9FAFB"/>
  <rect x="0" y="564" width="900" height="1" fill="#E5E7EB"/>
  <text x="12" y="576" font-family="Inter,Arial" font-size="9" fill="#9CA3AF">⚡ Speed PDF  •  Merge Tool  •  Ready</text>
</svg>
