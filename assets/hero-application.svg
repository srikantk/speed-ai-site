<svg width="1400" height="780" viewBox="0 0 1400 780" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Speed PDF application preview">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fff7f7"/>
      <stop offset="100%" stop-color="#ffe3e5"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#fff9f9"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="160%">
      <feDropShadow dx="0" dy="20" stdDeviation="24" flood-color="#a8121a" flood-opacity="0.24"/>
    </filter>
  </defs>

  <rect width="1400" height="780" fill="url(#bg)"/>
  <circle cx="1220" cy="120" r="170" fill="#ffd2d5" opacity="0.7"/>
  <circle cx="170" cy="670" r="160" fill="#ffd8db" opacity="0.55"/>

  <g filter="url(#shadow)">
    <rect x="250" y="90" width="900" height="560" rx="26" fill="url(#panel)" stroke="#f2cacc" stroke-width="2"/>
    <rect x="250" y="90" width="900" height="62" rx="26" fill="#fef0f1"/>
    <circle cx="286" cy="122" r="8" fill="#e02020"/>
    <circle cx="314" cy="122" r="8" fill="#f27a81"/>
    <circle cx="342" cy="122" r="8" fill="#f6b0b5"/>

    <image href="screenshots/pdf-editor.png" x="282" y="176" width="604" height="438" preserveAspectRatio="xMidYMid slice"/>

    <rect x="910" y="176" width="210" height="138" rx="14" fill="#ffffff" stroke="#f1c2c5"/>
    <image href="screenshots/ai-panel.png" x="922" y="188" width="186" height="114" preserveAspectRatio="xMidYMid slice"/>

    <rect x="910" y="334" width="210" height="138" rx="14" fill="#ffffff" stroke="#f1c2c5"/>
    <image href="screenshots/merge-tool.png" x="922" y="346" width="186" height="114" preserveAspectRatio="xMidYMid slice"/>

    <rect x="910" y="492" width="210" height="122" rx="14" fill="#fff1f2" stroke="#f1c2c5"/>
    <text x="930" y="536" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="700" fill="#a51218">Speed PDF</text>
    <text x="930" y="566" font-family="Inter, Arial, sans-serif" font-size="15" fill="#7c2a2f">Fast editing, AI actions, and signing</text>
  </g>
</svg>
