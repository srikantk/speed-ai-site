  <!-- User message -->
  <rect x="573" y="288" width="315" height="38" rx="10" fill="#4F46E5"/>
  <text x="588" y="304" font-family="Inter,Arial" font-size="11" fill="white">Summarize the highlighted section</text>
  <text x="588" y="318" font-family="Inter,Arial" font-size="11" fill="#C7D2FE">about market analysis</text>
  <text x="877" y="334" text-anchor="end" font-family="Inter,Arial" font-size="9" fill="#9CA3AF">You</text>

  <!-- AI thinking indicator -->
  <rect x="453" y="342" width="280" height="100" rx="10" fill="#F5F3FF" stroke="#EDE9FE" stroke-width="1"/>
  <text x="466" y="360" font-family="Inter,Arial" font-size="11" fill="#4F46E5" font-weight="700">✦ Speed AI</text>

  <rect x="466" y="368" width="255" height="6" rx="2" fill="#DDD6FE"/>
  <rect x="466" y="378" width="255" height="6" rx="2" fill="#DDD6FE"/>
  <rect x="466" y="388" width="180" height="6" rx="2" fill="#DDD6FE"/>

  <text x="466" y="412" font-family="Inter,Arial" font-size="10" fill="#7C3AED">The market analysis indicates a 28%</text>
  <text x="466" y="425" font-family="Inter,Arial" font-size="10" fill="#7C3AED">expansion opportunity in APAC by 2027,</text>
  <text x="466" y="438" font-family="Inter,Arial" font-size="10" fill="#4B5563">with competitor gaps in SMB segment.</text>

  <!-- Second AI response block -->
  <rect x="453" y="452" width="310" height="60" rx="10" fill="#F5F3FF" stroke="#EDE9FE" stroke-width="1"/>
  <text x="466" y="470" font-family="Inter,Arial" font-size="11" fill="#4F46E5" font-weight="700">Key Insights:</text>
  <text x="466" y="485" font-family="Inter,Arial" font-size="10" fill="#4B5563">• 28% APAC growth opportunity</text>
  <text x="466" y="498" font-family="Inter,Arial" font-size="10" fill="#4B5563">• SMB segment underserved</text>

  <!-- Copy/action buttons -->
  <rect x="453" y="520" width="70" height="24" rx="6" fill="#F5F3FF" stroke="#DDD6FE" stroke-width="1"/>
  <text x="488" y="536" text-anchor="middle" font-family="Inter,Arial" font-size="10" fill="#7C3AED">Copy</text>
  <rect x="529" y="520" width="80" height="24" rx="6" fill="#F5F3FF" stroke="#DDD6FE" stroke-width="1"/>
  <text x="569" y="536" text-anchor="middle" font-family="Inter,Arial" font-size="10" fill="#7C3AED">Insert</text>

  <!-- Input area -->
  <rect x="441" y="545" width="459" height="35" fill="white"/>
  <rect x="441" y="545" width="459" height="1" fill="#E5E7EB"/>
  <rect x="453" y="550" width="400" height="24" rx="8" fill="#F9FAFB" stroke="#E5E7EB" stroke-width="1"/>
  <text x="465" y="565" font-family="Inter,Arial" font-size="10" fill="#9CA3AF">Ask anything about this PDF…</text>
  <rect x="857" y="550" width="36" height="24" rx="6" fill="url(#aiGrad)"/>
  <text x="875" y="566" text-anchor="middle" font-family="Arial" font-size="12" fill="white">↑</text>

  <!-- Status bar -->
  <rect x="0" y="564" width="440" height="16" fill="#F9FAFB"/>
  <rect x="0" y="564" width="440" height="1" fill="#E5E7EB"/>
  <text x="12" y="576" font-family="Inter,Arial" font-size="9" fill="#9CA3AF">⚡ Model: Speed-7B • Running locally • 0ms latency</text>
</svg>
