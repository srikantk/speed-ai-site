<svg width="900" height="580" viewBox="0 0 900 580" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="aiGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4F46E5;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7C3AED;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F8F9FF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#F3F0FF;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="900" height="580" rx="12" fill="url(#bgGrad)"/>

  <!-- Title Bar -->
  <rect width="900" height="42" rx="12" fill="#F0EEFF"/>
  <rect y="30" width="900" height="12" fill="#F0EEFF"/>
  <rect y="42" width="900" height="1" fill="#DDD6FE"/>
  <circle cx="20" cy="21" r="6" fill="#FF5F57"/>
  <circle cx="38" cy="21" r="6" fill="#FEBC2E"/>
  <circle cx="56" cy="21" r="6" fill="#28C840"/>
  <text x="450" y="27" text-anchor="middle" font-family="Inter,Arial" font-size="13" fill="#7C3AED" font-weight="500">Speed PDF — AI Assistant</text>

  <!-- Main content area -->
  <!-- Left: PDF preview (dimmed) -->
  <rect x="0" y="43" width="440" height="537" fill="white" fill-opacity="0.5"/>
  <rect x="440" y="43" width="1" height="537" fill="#DDD6FE"/>

  <!-- PDF page (blurred/dimmed) -->
  <rect x="60" y="80" width="320" height="440" rx="6" fill="white" fill-opacity="0.8" stroke="#E5E7EB" stroke-width="1"/>
  <rect x="80" y="100" width="200" height="10" rx="2" fill="#D1D5DB"/>
  <rect x="80" y="118" width="280" height="6" rx="2" fill="#E5E7EB"/>
  <rect x="80" y="128" width="280" height="6" rx="2" fill="#E5E7EB"/>
  <rect x="80" y="138" width="200" height="6" rx="2" fill="#E5E7EB"/>
  <rect x="80" y="156" width="280" height="80" rx="4" fill="#F3F4F6"/>
  <!-- highlighted text -->
  <rect x="80" y="248" width="280" height="6" rx="2" fill="#E5E7EB"/>
  <rect x="80" y="258" width="280" height="6" rx="2" fill="#FEF08A" fill-opacity="0.8"/>
  <rect x="80" y="268" width="180" height="6" rx="2" fill="#FEF08A" fill-opacity="0.8"/>
  <rect x="80" y="278" width="280" height="6" rx="2" fill="#E5E7EB"/>
  <rect x="80" y="290" width="280" height="6" rx="2" fill="#E5E7EB"/>
  <rect x="80" y="300" width="220" height="6" rx="2" fill="#E5E7EB"/>
  <rect x="80" y="316" width="280" height="6" rx="2" fill="#E5E7EB"/>
  <rect x="80" y="326" width="280" height="6" rx="2" fill="#E5E7EB"/>
  <rect x="80" y="336" width="160" height="6" rx="2" fill="#E5E7EB"/>

  <!-- Selection indicator -->
  <rect x="80" y="256" width="4" height="18" rx="2" fill="#4F46E5"/>

  <!-- Right: AI Panel (main focus) -->
  <!-- AI Panel Header -->
  <rect x="441" y="43" width="459" height="537" fill="white"/>
  <rect x="441" y="43" width="459" height="72" fill="url(#aiGrad)"/>

  <!-- AI Logo area -->
  <circle cx="476" cy="82" r="20" fill="white" fill-opacity="0.2"/>
  <text x="476" y="88" text-anchor="middle" font-family="Arial" font-size="18" fill="white">✦</text>
  <text x="510" y="75" font-family="Inter,Arial" font-size="16" fill="white" font-weight="700">Speed AI</text>
  <text x="510" y="93" font-family="Inter,Arial" font-size="11" fill="#C7D2FE">Edge AI • Fully private • Offline</text>

  <!-- Suggested questions -->
  <text x="460" y="138" font-family="Inter,Arial" font-size="11" fill="#6B7280" font-weight="600">SUGGESTED QUESTIONS</text>
  <rect x="453" y="148" width="435" height="30" rx="8" fill="#F5F3FF" stroke="#DDD6FE" stroke-width="1"/>
  <text x="465" y="168" font-family="Inter,Arial" font-size="11" fill="#4F46E5">💡 Summarize this document in 3 bullet points</text>
  <rect x="453" y="184" width="435" height="30" rx="8" fill="#F5F3FF" stroke="#DDD6FE" stroke-width="1"/>
  <text x="465" y="204" font-family="Inter,Arial" font-size="11" fill="#4F46E5">💡 What are the main action items?</text>
  <rect x="453" y="220" width="435" height="30" rx="8" fill="#F5F3FF" stroke="#DDD6FE" stroke-width="1"/>
  <text x="465" y="240" font-family="Inter,Arial" font-size="11" fill="#4F46E5">💡 Extract all dates and deadlines</text>

